<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Pendaftaran PPDB')}"></head>
<body class="d-flex flex-column min-vh-100">

    <header th:replace="~{fragments :: navbar}"></header>

    <main class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card card-custom p-4">
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div class="bg-primary text-white p-3 rounded-3">
                            <i class="bi bi-person-plus-fill" style="font-size: 2rem;"></i>
                        </div>
                        <div>
                            <h2 class="fw-bold mb-0">Formulir Pendaftaran PPDB</h2>
                            <p class="text-muted mb-0">Silakan isi data calon siswa baru secara lengkap dan benar.</p>
                        </div>
                    </div>

                    <div th:if="${error}" class="alert alert-danger d-flex align-items-center" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <span th:text="${error}">Pesan error</span>
                    </div>

                    <form th:action="@{/ppdb/daftar}" th:object="${calonSiswa}" method="post">
                        <div class="row g-3">
                            <!-- NIK -->
                            <div class="col-md-6">
                                <label for="nik" class="form-label fw-semibold">Nomor Induk Kependudukan (NIK) <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="nik" th:field="*{nik}" required placeholder="16 digit NIK">
                            </div>

                            <!-- Nama Lengkap -->
                            <div class="col-md-6">
                                <label for="namaLengkap" class="form-label fw-semibold">Nama Lengkap Calon Siswa <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="namaLengkap" th:field="*{namaLengkap}" required placeholder="Sesuai Akta Kelahiran">
                            </div>

                            <!-- Tanggal Lahir -->
                            <div class="col-md-6">
                                <label for="tanggalLahir" class="form-label fw-semibold">Tanggal Lahir <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="tanggalLahir" th:field="*{tanggalLahir}" required>
                            </div>

                            <!-- Jenis Kelamin -->
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Jenis Kelamin <span class="text-danger">*</span></label>
                                <div>
                                    <div class="form-check form-check-inline mt-2">
                                        <input class="form-check-input" type="radio" name="jenisKelamin" id="lk" value="Laki-laki" th:field="*{jenisKelamin}" required>
                                        <label class="form-check-label" for="lk">Laki-laki</label>
                                    </div>
                                    <div class="form-check form-check-inline mt-2">
                                        <input class="form-check-input" type="radio" name="jenisKelamin" id="pr" value="Perempuan" th:field="*{jenisKelamin}" required>
                                        <label class="form-check-label" for="pr">Perempuan</label>
                                    </div>
                                </div>
                            </div>

                            <!-- Nama Orang Tua -->
                            <div class="col-md-6">
                                <label for="namaOrangTua" class="form-label fw-semibold">Nama Orang Tua / Wali <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="namaOrangTua" th:field="*{namaOrangTua}" required placeholder="Nama Ayah/Ibu/Wali">
                            </div>

                            <!-- No Telepon -->
                            <div class="col-md-6">
                                <label for="telepon" class="form-label fw-semibold">Nomor Telepon / HP <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="telepon" th:field="*{telepon}" required placeholder="Contoh: 08123456789">
                            </div>

                            <!-- Alamat -->
                            <div class="col-12">
                                <label for="alamat" class="form-label fw-semibold">Alamat Tempat Tinggal Lengkap <span class="text-danger">*</span></label>
                                <textarea class="form-control" id="alamat" th:field="*{alamat}" rows="3" required placeholder="Nama Jalan, RT/RW, Kecamatan, Kabupaten/Kota"></textarea>
                            </div>
                        </div>

                        <hr class="my-4">

                        <div class="d-flex justify-content-between align-items-center">
                            <a href="/" class="btn btn-light"><i class="bi bi-arrow-left"></i> Kembali</a>
                            <button type="submit" class="btn btn-primary-custom px-5"><i class="bi bi-send-fill me-2"></i> Kirim Pendaftaran</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: js}"></script>
</body>
</html>
