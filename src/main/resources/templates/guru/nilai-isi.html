<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Isi Nilai')}"></head>
<body class="d-flex flex-column min-vh-100">

    <header th:replace="~{fragments :: navbar}"></header>

    <div class="container-fluid flex-grow-1">
        <div class="row">
            <!-- Sidebar -->
            <div th:replace="~{fragments :: sidebar_guru('nilai')}"></div>

            <!-- Content Area -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
                    <h1 class="h2 fw-bold">Pengisian Nilai Akademik</h1>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a href="/guru/dashboard">Guru</a></li>
                            <li class="breadcrumb-item"><a href="/guru/nilai">Nilai</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Pengisian</li>
                        </ol>
                    </nav>
                </div>

                <!-- Info Header -->
                <div class="card card-custom p-3 mb-4 bg-light border-0 shadow-sm">
                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                        <div>
                            <span class="text-muted small">Kelas:</span>
                            <h5 class="fw-bold mb-0 text-success" th:text="${kelas.namaKelas}">X-A</h5>
                        </div>
                        <div>
                            <span class="text-muted small">Mata Pelajaran:</span>
                            <h5 class="fw-bold mb-0 text-primary" th:text="${mapel.namaMapel} + ' (' + ${mapel.kodeMapel} + ')'">Matematika</h5>
                        </div>
                    </div>
                </div>

                <!-- Nilai Table Form -->
                <div class="card card-custom p-4 bg-white shadow-sm">
                    <form th:action="@{/guru/nilai/simpan}" method="post">
                        <input type="hidden" name="kelasId" th:value="${kelas.id}">
                        <input type="hidden" name="mapelId" th:value="${mapel.id}">

                        <div class="table-responsive">
                            <table class="table table-bordered table-striped align-middle text-center">
                                <thead class="table-light">
                                    <tr>
                                        <th style="width: 15%;">NISN</th>
                                        <th class="text-start">Nama Lengkap Siswa</th>
                                        <th style="width: 15%;">Nilai Tugas (30%)</th>
                                        <th style="width: 15%;">Nilai UTS (30%)</th>
                                        <th style="width: 15%;">Nilai UAS (40%)</th>
                                        <th style="width: 15%;" class="table-primary text-primary">Nilai Akhir (Tercatat)</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="siswa : ${listSiswa}">
                                        <td class="font-monospace" th:text="${siswa.nisn}">NISN</td>
                                        <td class="text-start fw-bold" th:text="${siswa.namaLengkap}">Nama</td>
                                        <!-- Siswa ID -->
                                        <input type="hidden" name="siswaIds" th:value="${siswa.id}">
                                        
                                        <!-- Tugas -->
                                        <td>
                                            <input type="number" name="tugas" step="0.1" min="0" max="100" 
                                                   class="form-control text-center mx-auto" style="width: 100px;" required
                                                   th:value="${existingNilai[siswa.id] != null ? existingNilai[siswa.id].tugas : 0.0}">
                                        </td>
                                        <!-- UTS -->
                                        <td>
                                            <input type="number" name="uts" step="0.1" min="0" max="100" 
                                                   class="form-control text-center mx-auto" style="width: 100px;" required
                                                   th:value="${existingNilai[siswa.id] != null ? existingNilai[siswa.id].uts : 0.0}">
                                        </td>
                                        <!-- UAS -->
                                        <td>
                                            <input type="number" name="uas" step="0.1" min="0" max="100" 
                                                   class="form-control text-center mx-auto" style="width: 100px;" required
                                                   th:value="${existingNilai[siswa.id] != null ? existingNilai[siswa.id].uas : 0.0}">
                                        </td>
                                        <!-- Nilai Akhir -->
                                        <td class="table-primary fw-bold text-primary">
                                            <span th:text="${existingNilai[siswa.id] != null ? #numbers.formatDecimal(existingNilai[siswa.id].nilaiAkhir, 1, 1) : '-'}">-</span>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(listSiswa)}">
                                        <td colspan="6" class="text-center text-muted py-4">Belum ada siswa aktif yang ditempatkan di kelas ini.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <hr class="my-4">

                        <div class="d-flex justify-content-between align-items-center">
                            <a href="/guru/nilai" class="btn btn-light"><i class="bi bi-arrow-left"></i> Kembali</a>
                            <button th:disabled="${#lists.isEmpty(listSiswa)}" type="submit" class="btn btn-success px-5 fw-semibold"><i class="bi bi-save-fill me-1"></i> Simpan Nilai</button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: js}"></script>
</body>
</html>
