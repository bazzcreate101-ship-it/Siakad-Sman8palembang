<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Isi Absensi')}"></head>
<body class="d-flex flex-column min-vh-100">

    <header th:replace="~{fragments :: navbar}"></header>

    <div class="container-fluid flex-grow-1">
        <div class="row">
            <!-- Sidebar -->
            <div th:replace="~{fragments :: sidebar_guru('absensi')}"></div>

            <!-- Content Area -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
                    <h1 class="h2 fw-bold">Pengisian Absensi Kehadiran</h1>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a href="/guru/dashboard">Guru</a></li>
                            <li class="breadcrumb-item"><a href="/guru/absensi">Absensi</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Pengisian</li>
                        </ol>
                    </nav>
                </div>

                <!-- Info Header -->
                <div class="card card-custom p-3 mb-4 bg-light border-0 shadow-sm">
                    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                        <div>
                            <span class="text-muted small">Kelas:</span>
                            <h5 class="fw-bold mb-0 text-success" th:text="${kelas.namaKelas}">X-A</h5>
                        </div>
                        <div>
                            <span class="text-muted small">Tanggal Presensi:</span>
                            <h5 class="fw-bold mb-0 text-secondary" th:text="${tanggal}">2026-05-23</h5>
                        </div>
                    </div>
                </div>

                <!-- Absensi Table Form -->
                <div class="card card-custom p-4 bg-white shadow-sm">
                    <form th:action="@{/guru/absensi/simpan}" method="post">
                        <input type="hidden" name="kelasId" th:value="${kelas.id}">
                        <input type="hidden" name="tanggal" th:value="${tanggal}">

                        <div class="table-responsive">
                            <table class="table table-bordered table-striped align-middle text-center">
                                <thead class="table-light">
                                    <tr>
                                        <th style="width: 15%;">NISN</th>
                                        <th class="text-start">Nama Lengkap Siswa</th>
                                        <th style="width: 12%;" class="table-success text-success">Hadir</th>
                                        <th style="width: 12%;" class="table-warning text-warning">Sakit</th>
                                        <th style="width: 12%;" class="table-info text-info">Izin</th>
                                        <th style="width: 12%;" class="table-danger text-danger">Alpa</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="siswa : ${listSiswa}">
                                        <td class="font-monospace" th:text="${siswa.nisn}">NISN</td>
                                        <td class="text-start fw-bold" th:text="${siswa.namaLengkap}">Nama</td>
                                        <!-- Hadir -->
                                        <td class="table-success">
                                            <div class="form-check d-flex justify-content-center m-0">
                                                <input class="form-check-input" type="radio" 
                                                       th:name="'status_' + ${siswa.id}" value="HADIR" required
                                                       th:checked="${existingStatus[siswa.id] == 'HADIR' || existingStatus[siswa.id] == null}">
                                            </div>
                                        </td>
                                        <!-- Sakit -->
                                        <td class="table-warning">
                                            <div class="form-check d-flex justify-content-center m-0">
                                                <input class="form-check-input" type="radio" 
                                                       th:name="'status_' + ${siswa.id}" value="SAKIT" required
                                                       th:checked="${existingStatus[siswa.id] == 'SAKIT'}">
                                            </div>
                                        </td>
                                        <!-- Izin -->
                                        <td class="table-info">
                                            <div class="form-check d-flex justify-content-center m-0">
                                                <input class="form-check-input" type="radio" 
                                                       th:name="'status_' + ${siswa.id}" value="IZIN" required
                                                       th:checked="${existingStatus[siswa.id] == 'IZIN'}">
                                            </div>
                                        </td>
                                        <!-- Alpa -->
                                        <td class="table-danger">
                                            <div class="form-check d-flex justify-content-center m-0">
                                                <input class="form-check-input" type="radio" 
                                                       th:name="'status_' + ${siswa.id}" value="ALPA" required
                                                       th:checked="${existingStatus[siswa.id] == 'ALPA'}">
                                            </div>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(listSiswa)}">
                                        <td colspan="6" class="text-center text-muted py-4">Belum ada siswa aktif yang ditempatkan di kelas ini.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <hr class="my-4">

                        <div class="d-flex justify-content-between align-items-center">
                            <a href="/guru/absensi" class="btn btn-light"><i class="bi bi-arrow-left"></i> Kembali</a>
                            <button th:disabled="${#lists.isEmpty(listSiswa)}" type="submit" class="btn btn-success px-5 fw-semibold"><i class="bi bi-save me-1"></i> Simpan Presensi</button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: js}"></script>
</body>
</html>
