<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Cari Rapor')}"></head>
<body class="d-flex flex-column min-vh-100">

    <header th:replace="~{fragments :: navbar}"></header>

    <main class="container my-5 flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="row w-100 justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card card-custom p-4 shadow">
                    <div class="text-center mb-4">
                        <i class="bi bi-file-earmark-bar-graph-fill text-success" style="font-size: 3rem;"></i>
                        <h4 class="fw-bold mt-2">Cari Rapor Siswa</h4>
                        <p class="text-muted small">Masukkan NISN dan Tanggal Lahir siswa untuk mengakses rapor digital.</p>
                    </div>

                    <div th:if="${error}" class="alert alert-danger py-2 small" role="alert">
                        <i class="bi bi-x-circle-fill me-2"></i> <span th:text="${error}">Error</span>
                    </div>

                    <form th:action="@{/rapor/cari}" method="get">
                        <div class="mb-3">
                            <label for="nisn" class="form-label fw-semibold">Nomor Induk Siswa Nasional (NISN)</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-card-text"></i></span>
                                <input type="text" class="form-control" id="nisn" name="nisn" required placeholder="Masukkan 10 digit NISN" th:value="${param.nisn}">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="tanggalLahir" class="form-label fw-semibold">Tanggal Lahir Siswa</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-calendar"></i></span>
                                <input type="date" class="form-control" id="tanggalLahir" name="tanggalLahir" required th:value="${param.tanggalLahir}">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100 py-2 fw-semibold rounded-pill shadow-sm">
                            <i class="bi bi-search me-1"></i> TAMPILKAN RAPOR
                        </button>
                    </form>

                    <div class="mt-4 text-center">
                        <a href="/" class="small text-decoration-none"><i class="bi bi-arrow-left"></i> Kembali ke Beranda</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: js}"></script>
</body>
</html>
