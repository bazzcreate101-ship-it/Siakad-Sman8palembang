<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Kelola Siswa')}"></head>
<body class="d-flex flex-column min-vh-100">

    <header th:replace="~{fragments :: navbar}"></header>

    <div class="container-fluid flex-grow-1">
        <div class="row">
            <!-- Sidebar -->
            <div th:replace="~{fragments :: sidebar_admin('siswa')}"></div>

            <!-- Content Area -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
                    <h1 class="h2 fw-bold">Manajemen Siswa Aktif</h1>
                </div>

                <!-- Alert Messages -->
                <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i> Kelas siswa berhasil diperbarui!
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${param.deleted}" class="alert alert-warning alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> Data siswa berhasil dihapus!
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Students Table -->
                <div class="card card-custom p-4 bg-white shadow-sm">
                    <h5 class="fw-bold mb-3 border-bottom pb-2">Daftar Siswa Aktif</h5>
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle table-custom">
                            <thead>
                                <tr>
                                    <th>NISN</th>
                                    <th>Nama Lengkap</th>
                                    <th>Kelas Saat Ini</th>
                                    <th>Status</th>
                                    <th class="text-center" style="width: 25%;">Atur Kelas</th>
                                    <th class="text-center" style="width: 10%;">Aksi</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="siswa : ${listSiswa}">
                                    <td class="font-monospace fw-semibold" th:text="${siswa.nisn}">NISN</td>
                                    <td class="fw-bold" th:text="${siswa.namaLengkap}">Nama</td>
                                    <td>
                                        <span th:if="${siswa.kelas != null}" class="badge bg-primary px-3 py-1" th:text="${siswa.kelas.namaKelas}">Kelas</span>
                                        <span th:unless="${siswa.kelas != null}" class="badge bg-secondary px-3 py-1">Belum Ditempatkan</span>
                                    </td>
                                    <td>
                                        <span class="badge bg-success" th:text="${siswa.status}">AKTIF</span>
                                    </td>
                                    <td class="text-center">
                                        <!-- Set Kelas Form -->
                                        <form th:action="@{/admin/siswa/set-kelas}" method="post" class="d-flex align-items-center gap-2 m-0 justify-content-center">
                                            <input type="hidden" name="siswaId" th:value="${siswa.id}">
                                            <select class="form-select form-select-sm" name="kelasId" required style="width: auto;">
                                                <option value="" disabled th:selected="${siswa.kelas == null}">-- Pilih Kelas --</option>
                                                <option th:each="kls : ${listKelas}"
                                                        th:value="${kls.id}"
                                                        th:text="${kls.namaKelas}"
                                                        th:selected="${siswa.kelas != null && kls.id == siswa.kelas.id}">
                                                    Kelas
                                                </option>
                                            </select>
                                            <button type="submit" class="btn btn-sm btn-primary-custom px-3">Update</button>
                                        </form>
                                    </td>
                                    <td class="text-center">
                                        <!-- Delete Form -->
                                        <form th:action="@{/admin/siswa/delete}" method="post" class="m-0" onsubmit="return confirm('Apakah Anda yakin ingin menghapus data siswa ini?')">
                                            <input type="hidden" name="id" th:value="${siswa.id}">
                                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash3-fill"></i> Hapus</button>
                                        </form>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(listSiswa)}">
                                    <td colspan="6" class="text-center text-muted py-4">Belum ada siswa aktif yang terdaftar di sistem.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: js}"></script>
</body>
</html>
