<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Kelola Mapel')}"></head>
<body class="d-flex flex-column min-vh-100">

    <header th:replace="~{fragments :: navbar}"></header>

    <div class="container-fluid flex-grow-1">
        <div class="row">
            <!-- Sidebar -->
            <div th:replace="~{fragments :: sidebar_admin('mapel')}"></div>

            <!-- Content Area -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
                    <h1 class="h2 fw-bold">Manajemen Mata Pelajaran</h1>
                </div>

                <!-- Alert Messages -->
                <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i> Mata pelajaran baru berhasil ditambahkan!
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${param.deleted}" class="alert alert-warning alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> Mata pelajaran berhasil dihapus!
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-x-circle-fill me-2"></i> Gagal: <span th:text="${param.error}">Pesan error</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="row g-4">
                    <!-- Left: Form Tambah Mapel -->
                    <div class="col-lg-4">
                        <div class="card card-custom p-4 bg-white shadow-sm">
                            <h5 class="fw-bold mb-3 border-bottom pb-2"><i class="bi bi-plus-circle-fill text-primary me-2"></i> Tambah Mata Pelajaran</h5>
                            
                            <form th:action="@{/admin/mapel/tambah}" th:object="${mapel}" method="post">
                                <div class="mb-3">
                                    <label for="kodeMapel" class="form-label fw-semibold">Kode Mata Pelajaran <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="kodeMapel" th:field="*{kodeMapel}" required placeholder="Contoh: MAT, BIN, IPA">
                                </div>

                                <div class="mb-4">
                                    <label for="namaMapel" class="form-label fw-semibold">Nama Mata Pelajaran <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="namaMapel" th:field="*{namaMapel}" required placeholder="Contoh: Matematika Wajib">
                                </div>

                                <button type="submit" class="btn btn-primary-custom w-100"><i class="bi bi-plus-lg"></i> Simpan Mapel</button>
                            </form>
                        </div>
                    </div>

                    <!-- Right: Daftar Mapel Table -->
                    <div class="col-lg-8">
                        <div class="card card-custom p-4 bg-white shadow-sm">
                            <h5 class="fw-bold mb-3 border-bottom pb-2">Daftar Mata Pelajaran</h5>
                            <div class="table-responsive">
                                <table class="table table-striped table-hover align-middle table-custom">
                                    <thead>
                                        <tr>
                                            <th>Kode Mapel</th>
                                            <th>Nama Mata Pelajaran</th>
                                            <th class="text-center" style="width: 20%;">Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="m : ${listMapel}">
                                            <td class="font-monospace fw-bold" th:text="${m.kodeMapel}">KODE</td>
                                            <td th:text="${m.namaMapel}">Nama Mapel</td>
                                            <td class="text-center">
                                                <form th:action="@{/admin/mapel/delete}" method="post" class="m-0" onsubmit="return confirm('Apakah Anda yakin ingin menghapus mata pelajaran ini?')">
                                                    <input type="hidden" name="id" th:value="${m.id}">
                                                    <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash3-fill"></i> Hapus</button>
                                                </form>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(listMapel)}">
                                            <td colspan="3" class="text-center text-muted py-4">Belum ada mata pelajaran terdaftar.</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: js}"></script>
</body>
</html>
