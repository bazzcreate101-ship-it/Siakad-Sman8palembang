<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Pengaturan PPDB')}"></head>
<body class="d-flex flex-column min-vh-100">

    <header th:replace="~{fragments :: navbar}"></header>

    <div class="container-fluid flex-grow-1">
        <div class="row">
            <!-- Sidebar -->
            <div th:replace="~{fragments :: sidebar_admin('ppdb')}"></div>

            <!-- Content Area -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
                    <h1 class="h2 fw-bold">Pengaturan PPDB</h1>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a href="/admin/dashboard">Admin</a></li>
                            <li class="breadcrumb-item"><a href="/admin/ppdb">PPDB</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Pengaturan</li>
                        </ol>
                    </nav>
                </div>

                <div class="row justify-content-center">
                    <div class="col-lg-6">
                        <div class="card card-custom p-4 bg-white shadow-sm">
                            <h5 class="fw-bold mb-4 border-bottom pb-2"><i class="bi bi-gear-fill text-primary me-2"></i> Konfigurasi Pendaftaran</h5>

                            <div th:if="${error}" class="alert alert-danger" role="alert">
                                <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}">Error</span>
                            </div>

                            <form th:action="@{/admin/ppdb/pengaturan}" th:object="${pengaturan}" method="post">
                                <div class="mb-3">
                                    <label for="tanggalBuka" class="form-label fw-semibold">Tanggal Pendaftaran Dibuka <span class="text-danger">*</span></label>
                                    <input type="date" class="form-control" id="tanggalBuka" th:field="*{tanggalBuka}" required>
                                </div>

                                <div class="mb-3">
                                    <label for="tanggalTutup" class="form-label fw-semibold">Tanggal Pendaftaran Ditutup <span class="text-danger">*</span></label>
                                    <input type="date" class="form-control" id="tanggalTutup" th:field="*{tanggalTutup}" required>
                                </div>

                                <div class="mb-3">
                                    <label for="tanggalPengumuman" class="form-label fw-semibold">Tanggal Pengumuman Kelulusan <span class="text-danger">*</span></label>
                                    <input type="date" class="form-control" id="tanggalPengumuman" th:field="*{tanggalPengumuman}" required>
                                </div>

                                <div class="mb-4">
                                    <label for="kuota" class="form-label fw-semibold">Kuota Maksimal Calon Siswa Diterima <span class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="kuota" th:field="*{kuota}" min="1" required placeholder="Contoh: 50">
                                </div>

                                <div class="d-flex justify-content-between align-items-center">
                                    <a href="/admin/ppdb" class="btn btn-light"><i class="bi bi-arrow-left"></i> Kembali</a>
                                    <button type="submit" class="btn btn-primary-custom px-4"><i class="bi bi-save-fill me-1"></i> Simpan Pengaturan</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: js}"></script>
</body>
</html>
