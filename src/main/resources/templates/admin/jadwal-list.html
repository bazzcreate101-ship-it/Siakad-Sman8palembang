<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Kelola Jadwal')}"></head>
<body class="d-flex flex-column min-vh-100">

    <header th:replace="~{fragments :: navbar}"></header>

    <div class="container-fluid flex-grow-1">
        <div class="row">
            <!-- Sidebar -->
            <div th:replace="~{fragments :: sidebar_admin('jadwal')}"></div>

            <!-- Content Area -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
                    <h1 class="h2 fw-bold">Jadwal Pelajaran</h1>
                    <div class="d-flex gap-2">
                        <a href="/admin/jadwal/tambah" class="btn btn-primary-custom"><i class="bi bi-calendar-plus-fill me-1"></i> Tambah Jadwal Baru</a>
                    </div>
                </div>

                <!-- Alert Messages -->
                <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i> Jadwal pelajaran berhasil dibuat!
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${param.deleted}" class="alert alert-warning alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> Jadwal pelajaran berhasil dihapus!
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Schedules Table -->
                <div class="card card-custom p-4 bg-white shadow-sm">
                    <h5 class="fw-bold mb-3 border-bottom pb-2">Jadwal Belajar Mengajar Aktif</h5>
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle table-custom">
                            <thead>
                                <tr>
                                    <th>Kelas</th>
                                    <th>Mata Pelajaran</th>
                                    <th>Guru Pengampu</th>
                                    <th>Hari</th>
                                    <th>Waktu Belajar</th>
                                    <th class="text-center" style="width: 15%;">Aksi</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="j : ${listJadwal}">
                                    <td><span class="badge bg-primary px-3 py-1" th:text="${j.kelas.namaKelas}">X-A</span></td>
                                    <td class="fw-bold" th:text="${j.mataPelajaran.namaMapel}">Matematika</td>
                                    <td th:text="${j.guru.namaLengkap}">Budi Santoso, S.Pd.</td>
                                    <td th:text="${j.hari}">Senin</td>
                                    <td class="font-monospace" th:text="${j.jamMulai} + ' - ' + ${j.jamSelesai}">07:30 - 09:00</td>
                                    <td class="text-center">
                                        <form th:action="@{/admin/jadwal/delete}" method="post" class="m-0" onsubmit="return confirm('Apakah Anda yakin ingin menghapus jadwal ini?')">
                                            <input type="hidden" name="id" th:value="${j.id}">
                                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash3-fill"></i> Hapus</button>
                                        </form>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(listJadwal)}">
                                    <td colspan="6" class="text-center text-muted py-4">Belum ada jadwal mengajar yang disusun.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: js}"></script>
</body>
</html>
