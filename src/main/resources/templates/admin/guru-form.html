<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head(${guru.id != null} ? 'Edit Guru' : 'Tambah Guru')}"></head>
<body class="d-flex flex-column min-vh-100">

    <header th:replace="~{fragments :: navbar}"></header>

    <div class="container-fluid flex-grow-1">
        <div class="row">
            <!-- Sidebar -->
            <div th:replace="~{fragments :: sidebar_admin('guru')}"></div>

            <!-- Content Area -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
                    <h1 class="h2 fw-bold" th:text="${guru.id != null} ? 'Edit Data Guru' : 'Tambah Guru Baru'">Tambah Guru</h1>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a href="/admin/dashboard">Admin</a></li>
                            <li class="breadcrumb-item"><a href="/admin/guru">Guru</a></li>
                            <li class="breadcrumb-item active" aria-current="page" th:text="${guru.id != null} ? 'Edit' : 'Tambah'">Tambah</li>
                        </ol>
                    </nav>
                </div>

                <div class="row justify-content-center">
                    <div class="col-lg-6">
                        <div class="card card-custom p-4 bg-white shadow-sm">
                            <h5 class="fw-bold mb-4 border-bottom pb-2">
                                <i class="bi bi-person-fill-gear text-primary me-2"></i>
                                <span th:text="${guru.id != null} ? 'Formulir Perubahan Data' : 'Formulir Pendaftaran Baru'">Formulir</span>
                            </h5>

                            <div th:if="${error}" class="alert alert-danger" role="alert">
                                <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${error}">Error</span>
                            </div>

                            <form th:action="${guru.id != null} ? @{/admin/guru/edit/{id}(id=${guru.id})} : @{/admin/guru/tambah}" th:object="${guru}" method="post">
                                <div class="mb-3">
                                    <label for="nip" class="form-label fw-semibold">Nomor Induk Pegawai (NIP) <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="nip" th:field="*{nip}" required placeholder="18 digit NIP" th:readonly="${guru.id != null}">
                                </div>

                                <div class="mb-3">
                                    <label for="namaLengkap" class="form-label fw-semibold">Nama Lengkap Guru (beserta gelar) <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="namaLengkap" th:field="*{namaLengkap}" required placeholder="Contoh: Budi Santoso, S.Pd.">
                                </div>

                                <div class="mb-3">
                                    <label for="username" class="form-label fw-semibold">Username Login Portal <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="username" th:field="*{username}" required placeholder="Username unik">
                                </div>

                                <div class="mb-4">
                                    <label for="password" class="form-label fw-semibold">Password Portal <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="password" th:field="*{password}" required placeholder="Password portal masuk">
                                </div>

                                <div class="d-flex justify-content-between align-items-center">
                                    <a href="/admin/guru" class="btn btn-light"><i class="bi bi-arrow-left"></i> Batal</a>
                                    <button type="submit" class="btn btn-primary-custom px-4"><i class="bi bi-save-fill me-1"></i> Simpan Data</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: js}"></script>
</body>
</html>
