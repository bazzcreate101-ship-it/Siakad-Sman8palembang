<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html_head('Kelola Kelas')}"></head>
<body class="d-flex flex-column min-vh-100">

    <header th:replace="~{fragments :: navbar}"></header>

    <div class="container-fluid flex-grow-1">
        <div class="row">
            <!-- Sidebar -->
            <div th:replace="~{fragments :: sidebar_admin('kelas')}"></div>

            <!-- Content Area -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
                    <h1 class="h2 fw-bold">Manajemen Kelas</h1>
                </div>

                <!-- Alert Messages -->
                <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i> Kelas baru berhasil ditambahkan!
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${param.deleted}" class="alert alert-warning alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> Kelas berhasil dihapus!
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-x-circle-fill me-2"></i> Gagal: <span th:text="${param.error}">Pesan error</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="row g-4">
                    <!-- Left: Tambah Kelas Form -->
                    <div class="col-lg-4">
                        <div class="card card-custom p-4 bg-white shadow-sm">
                            <h5 class="fw-bold mb-3 border-bottom pb-2"><i class="bi bi-plus-circle-fill text-primary me-2"></i> Tambah Kelas</h5>
                            
                            <form th:action="@{/admin/kelas/tambah}" th:object="${kelas}" method="post">
                                <div class="mb-3">
                                    <label for="namaKelas" class="form-label fw-semibold">Nama Kelas <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="namaKelas" th:field="*{namaKelas}" required placeholder="Contoh: X-A, XI-B">
                                </div>

                                <div class="mb-4">
                                    <label for="tingkat" class="form-label fw-semibold">Tingkat Kelas <span class="text-danger">*</span></label>
                                    <select class="form-select" id="tingkat" th:field="*{tingkat}" required>
                                        <option value="" disabled selected>-- Pilih Tingkat --</option>
                                        <option value="10">10 (Sepuluh)</option>
                                        <option value="11">11 (Sebelas)</option>
                                        <option value="12">12 (Dua Belas)</option>
                                    </select>
                                </div>

                                <button type="submit" class="btn btn-primary-custom w-100"><i class="bi bi-plus-lg"></i> Simpan Kelas</button>
                            </form>
                        </div>
                    </div>

                    <!-- Right: Daftar Kelas Table -->
                    <div class="col-lg-8">
                        <div class="card card-custom p-4 bg-white shadow-sm">
                            <h5 class="fw-bold mb-3 border-bottom pb-2">Daftar Kelas Terdaftar</h5>
                            <div class="table-responsive">
                                <table class="table table-striped table-hover align-middle table-custom">
                                    <thead>
                                        <tr>
                                            <th>ID Kelas</th>
                                            <th>Nama Kelas</th>
                                            <th>Tingkat</th>
                                            <th class="text-center" style="width: 20%;">Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="kls : ${listKelas}">
                                            <td class="font-monospace" th:text="${kls.id}">ID</td>
                                            <td class="fw-bold" th:text="${kls.namaKelas}">Nama Kelas</td>
                                            <td th:text="${kls.tingkat}">Tingkat</td>
                                            <td class="text-center">
                                                <form th:action="@{/admin/kelas/delete}" method="post" class="m-0" onsubmit="return confirm('Apakah Anda yakin ingin menghapus kelas ini?')">
                                                    <input type="hidden" name="id" th:value="${kls.id}">
                                                    <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash3-fill"></i> Hapus</button>
                                                </form>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(listKelas)}">
                                            <td colspan="4" class="text-center text-muted py-4">Belum ada kelas yang terdaftar.</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <footer th:replace="~{fragments :: footer}"></footer>
    <script th:replace="~{fragments :: js}"></script>
</body>
</html>
