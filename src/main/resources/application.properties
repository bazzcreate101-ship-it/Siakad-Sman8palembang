spring.application.name=sistem-akademik

# Server Port (Railway reads from PORT env variable)
server.port=${PORT:8080}

# Database Configuration (Defaults to local H2 file-based database)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/academic_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA Configuration (Dialect is auto-detected by Hibernate based on the datasource URL)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console Configuration (Useful for local H2 debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Thymeleaf Configuration
spring.thymeleaf.cache=false
